spring.application.name=your-punchbread

# 1. Database Connection URL
# Replace 'localhost:3306' with your host/port if different
# Force the connection to use UTC or Asia/Yangon
spring.datasource.url=jdbc:mysql://localhost:3306/your_punchbread?serverTimezone=Asia/Yangon

# 2. Database Credentials
spring.datasource.username=root
spring.datasource.password=323978

# 3. MySQL Driver (Spring Boot 3+ uses this by default)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 4. JPA / Hibernate Properties
# 'update' automatically creates/updates tables based on your Java Entities
spring.jpa.hibernate.ddl-auto=update
# Shows the actual SQL queries in your console (very helpful for debugging!)
spring.jpa.show-sql=true
# Formats the SQL in the console so it's readable
spring.jpa.properties.hibernate.format_sql=true
# Tells Hibernate you are using MySQL
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect