spring.application.name=your-punchbread

# 1. Dynamic Database Connection
# Railway will provide MYSQLHOST, MYSQLPORT, and MYSQLDATABASE automatically.
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:your_punchbread}?serverTimezone=Asia/Yangon

# 2. Dynamic Credentials
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:323978}

# 3. MySQL Driver
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 4. JPA / Hibernate Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# 5. Production Port (Railway tells the app which port to use)
server.port=${PORT:8080}